
name: Live Stream Bypass & Record

on:
  workflow_dispatch:
    inputs:
      stream_url:
        description: 'Target Stream URL (Jis website ki recording karni hai)'
        required: true
        default: 'https://dadocric.st/player.php?id=starsp3&v=m'

jobs:
  bypass-and-record:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg libgbm-dev

      - name: Install Puppeteer & Stealth
        run: |
          npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth

      - name: Run Browser Script (Native Recording)
        # Yahan hum input URL ko environment variable mein pass kar rahe hain
        env:
          STREAM_URL: ${{ github.event.inputs.stream_url }}
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          export DISPLAY=:99
          sleep 3
          node browser.js

      - name: Convert to Smooth MP4
        run: |
          if [ -f raw_video.webm ]; then
            echo "Converting to high quality MP4..."
            ffmpeg -i raw_video.webm -c:v libx264 -preset fast -c:a aac bypass_record.mp4
            echo "Conversion done!"
          else
            echo "Video file not found!"
            exit 1
          fi

      - name: Upload Recording Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Stream-Bypass-Video
          path: bypass_record.mp4
          retention-days: 1



















